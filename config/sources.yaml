# 跨境技术采集服务 - 数据源配置
# 每个源独立配置，采集失败不影响其他源

rss_sources:
  # === AI / 前沿技术 ===
  - name: "OpenAI Blog"
    url: "https://openai.com/blog/rss.xml"
    category: "ai-commerce"
    filter_mode: "all"

  # === 开发者工具 / 开源生态 ===
  - name: "GitHub Blog"
    url: "https://github.blog/feed/"
    category: "dev-tools"
    filter_mode: "all"

  - name: "Hacker News (frontpage)"
    url: "https://hnrss.org/frontpage"
    category: "dev-tools"
    filter_mode: "keyword"
    keywords:
      - ecommerce
      - shopify
      - amazon
      - payment
      - logistics
      - scraper
      - translation
      - localization
      - marketplace
      - retail
      - stripe
      - woo
      - cross-border
      - dropship

  - name: "Hacker News (Show HN)"
    url: "https://hnrss.org/show"
    category: "dev-tools"
    filter_mode: "keyword"
    keywords:
      - ecommerce
      - shopify
      - amazon
      - payment
      - logistics
      - scraper
      - translation
      - localization
      - marketplace
      - retail
      - stripe
      - woo
      - cross-border
      - dropship

  # === 电商平台 / 行业媒体 ===
  - name: "TechCrunch"
    url: "https://techcrunch.com/feed/"
    category: "ai-commerce"
    filter_mode: "keyword"
    keywords:
      - ecommerce
      - retail
      - marketplace
      - cross-border
      - AI commerce
      - shopify
      - amazon
      - stripe

  - name: "Amazon Blog"
    url: "https://blog.aboutamazon.com/feed"
    category: "cross-border-tech"
    filter_mode: "keyword"
    keywords:
      - ecommerce
      - seller
      - marketplace
      - logistics
      - AWS
      - cloud

  - name: "WooCommerce Dev Blog"
    url: "https://developer.woocommerce.com/feed/"
    category: "cross-border-tech"
    filter_mode: "all"

  # === 中文跨境媒体 ===
  - name: "36kr"
    url: "https://36kr.com/feed"
    category: "cross-border"
    filter_mode: "keyword"
    keywords:
      - 出海
      - 跨境
      - 电商
      - 海外
      - 全球化
      - 独立站

  # === 预留（暂不可用，待二期爬虫）===
  # Shopify Engineering: RSS 404
  # Stripe Blog: RSS 404
  # 亿邦动力: RSS 重定向
  # 雨果网: XML 格式错误
  # 量子位: XML 解析错误

github_trending_sources:
