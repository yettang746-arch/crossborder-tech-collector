# 跨境技术采集服务 - 数据源配置
# 每个源独立配置，采集失败不影响其他源

rss_sources:
  # === 保留源（带关键词过滤）===
  - name: "Hacker News (frontpage)"
    url: "https://hnrss.org/frontpage"
    category: "dev-tools"
    filter_mode: "keyword"  # keyword = 标题/摘要含关键词才保留
    keywords:
      - ecommerce
      - shopify
      - amazon
      - payment
      - logistics
      - scraper
      - translation
      - localization
      - marketplace
      - retail
      - stripe
      - woo
      - cross-border
      - dropship

  - name: "Hacker News (Show HN)"
    url: "https://hnrss.org/show"
    category: "dev-tools"
    filter_mode: "keyword"
    keywords:
      - ecommerce
      - shopify
      - amazon
      - payment
      - logistics
      - scraper
      - translation
      - localization
      - marketplace
      - retail
      - stripe
      - woo
      - cross-border
      - dropship

  - name: "GitHub Blog"
    url: "https://github.blog/feed/"
    category: "dev-tools"
    filter_mode: "all"  # 全量保留

  - name: "TechCrunch"
    url: "https://techcrunch.com/feed/"
    category: "ai-commerce"
    filter_mode: "keyword"
    keywords:
      - ecommerce
      - retail
      - marketplace
      - cross-border
      - AI commerce
      - shopify
      - amazon
      - stripe

  - name: "36kr"
    url: "https://36kr.com/feed"
    category: "cross-border"
    filter_mode: "keyword"
    keywords:
      - 出海
      - 跨境
      - 电商
      - 海外
      - 全球化
      - 独立站

  - name: "OpenAI Blog"
    url: "https://openai.com/blog/rss.xml"
    category: "ai-commerce"
    filter_mode: "all"

  - name: "量子位"
    url: "https://www.jiqizhixin.com/rss"
    category: "ai-commerce"
    filter_mode: "keyword"
    keywords:
      - 电商
      - 零售
      - 出海
      - 跨境
      - 商业化
      - 应用

  # === 新增核心源 ===
  - name: "WooCommerce Dev Blog"
    url: "https://developer.woocommerce.com/feed/"
    category: "cross-border-tech"
    filter_mode: "all"

  # Shopify/Stripe RSS 已停用，二期用 web_scraper 替代
  # - name: "Shopify Engineering Blog"
  #   url: "https://shopify.engineering/feed"
  # - name: "Stripe Blog"
  #   url: "https://stripe.com/blog/feed/rss"

  # 量子位 RSS 返回 HTML，暂不可用
  # - name: "量子位"
  #   url: "https://www.jiqizhixin.com/rss"

github_trending_sources:
  - name: "GitHub Trending (ecommerce)"
    topic: "ecommerce"
    category: "cross-border-tech"

  - name: "GitHub Trending (scraper)"
    topic: "scraper"
    category: "dev-tools"

  - name: "GitHub Trending (translation/i18n)"
    topic: "translation"
    category: "dev-tools"

  - name: "GitHub Trending (marketplace)"
    topic: "marketplace"
    category: "cross-border-tech"

