version: "3.8"

services:
  collector:
    build: .
    container_name: crossborder-collector
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - collector-data:/app/data
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/collector.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  collector-data:
